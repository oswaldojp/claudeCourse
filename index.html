<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Editor</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f6f8fa;
      padding: 24px;
    }

    .editor-container {
      max-width: 800px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      overflow: hidden;
    }

    .tab-bar {
      display: flex;
      gap: 4px;
      padding: 8px 8px 0;
      background: #f6f8fa;
      border-bottom: 1px solid #d0d7de;
    }

    .tab-btn {
      padding: 6px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      background: transparent;
      color: #57606a;
      position: relative;
      bottom: -1px;
    }

    .tab-btn:hover {
      background: #f3f4f6;
      color: #24292f;
    }

    .tab-btn.active {
      background: #fff;
      border-color: #d0d7de;
      color: #24292f;
    }

    .tab-panel {
      display: none;
      padding: 16px;
      min-height: 200px;
    }

    .tab-panel.active {
      display: block;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Consolas, monospace;
      font-size: 13px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 12px;
      resize: vertical;
      outline: none;
      color: #24292f;
    }

    textarea:focus {
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
    }

    .preview-content {
      font-size: 14px;
      line-height: 1.6;
      color: #24292f;
      min-height: 180px;
    }

    .preview-content p {
      margin-bottom: 12px;
    }

    .preview-placeholder {
      color: #8c959f;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="editor-container">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="code">Code</button>
      <button class="tab-btn" data-tab="preview">Preview</button>
    </div>

    <div id="tab-code" class="tab-panel active">
      <textarea id="code-input" placeholder="Write your markdown here...">## Hello World

This is some **bold** and _italic_ text.

- Item one
- Item two
- Item three</textarea>
    </div>

    <div id="tab-preview" class="tab-panel">
      <div class="preview-content" id="preview-output">
        <p class="preview-placeholder">Switch to Preview to see rendered output.</p>
      </div>
    </div>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.tab-panel');
    const codeInput = document.getElementById('code-input');
    const previewOutput = document.getElementById('preview-output');

    function renderMarkdown(text) {
      return text
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/_(.+?)_/g, '<em>$1</em>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/^(?!<[hul])(.+)$/gm, '<p>$1</p>');
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.tab;

        tabs.forEach(t => t.classList.remove('active'));
        panels.forEach(p => p.classList.remove('active'));

        tab.classList.add('active');
        document.getElementById('tab-' + target).classList.add('active');

        if (target === 'preview') {
          const raw = codeInput.value.trim();
          previewOutput.innerHTML = raw
            ? renderMarkdown(raw)
            : '<p class="preview-placeholder">Nothing to preview.</p>';
        }
      });
    });
  </script>
</body>
</html>
